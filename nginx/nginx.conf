# =============================================================================
# Evo CRM Community — Nginx API Gateway
# =============================================================================
# Routes all API traffic through a single domain, dispatching to internal
# services by URL path. Only 2 public domains needed:
#   - API_DOMAIN   → this nginx (all backend services)
#   - FRONTEND_DOMAIN → evo_frontend (React/Vite)
# =============================================================================

# =============================================================================
# Upstream Services (Docker Swarm service names)
# =============================================================================
upstream auth_service {
    server evo_auth:3001;
}

upstream crm_service {
    server evo_crm:3000;
}

upstream evoai_service {
    server evo_core:5555;
}

upstream processor_service {
    server evo_processor:8000;
}

upstream bot_runtime_service {
    server evo_bot_runtime:8080;
}

# =============================================================================
# Server Configuration
# =============================================================================
server {
    listen 3030;
    server_name _;

    # Allow underscores in header names (needed for api_access_token and similar custom headers)
    underscores_in_headers on;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Increase body size limit for file uploads
    client_max_body_size 100M;

    # =============================================================================
    # Auth Service Routes
    # =============================================================================

    # OAuth Provider routes (Doorkeeper)
    location ~ ^/oauth {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # OAuth well-known endpoints (RFC 8414, RFC 8707)
    location ~ ^/\.well-known {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Auth endpoints (auth, profile, users, mfa, features, plans, permissions, roles, etc.)
    location ~ ^/api/v1/(auth|profile|mfa|features|plans|resource_actions|permissions|roles|custom_roles|oauth_applications|access_tokens|data_privacy|dynamic_oauth|active_plan) {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With, account-id, api_access_token' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass_header 'Access-Control-Allow-Origin';
        proxy_pass_header 'Access-Control-Allow-Methods';
        proxy_pass_header 'Access-Control-Allow-Headers';
        proxy_pass_header 'Access-Control-Allow-Credentials';
    }

    # Users routes (including sub-routes like /api/v1/users/:id/role, /update_password, etc.)
    location ~ ^/api/v1/users {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # POST /api/v1/accounts → Auth Service (account creation)
    location ~ ^/api/v1/accounts$ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Webhooks with accountId → CRM Service (must be before generic accounts/:id route)
    location ~ ^/api/v1/accounts/[^/]+/webhooks {
        proxy_pass http://crm_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 10M;
    }

    # GET/PATCH /api/v1/accounts/:id → Auth Service (account CRUD)
    location ~ ^/api/v1/accounts/[^/]+$ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Auth Service API v2 routes
    location ~ ^/api/v2/accounts$ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Platform API routes
    location ~ ^/platform/api/v1 {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =============================================================================
    # Bot Runtime Routes
    # =============================================================================
    location ~ ^/api/v1/bot-runtime {
        proxy_pass http://bot_runtime_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }

    # =============================================================================
    # AI Processor Service Routes — Custom MCP Discover Tools (before EvoAI routes)
    # =============================================================================
    location ~ ^/api/v1/custom-mcp-servers/discover-tools {
        proxy_pass http://processor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =============================================================================
    # EvoAI Core Service Routes
    # =============================================================================
    location ~ ^/api/v1/(agents|folders|mcp-servers|custom-mcp-servers|custom-tools) {
        proxy_pass http://evoai_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header account-id $http_account_id;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =============================================================================
    # AI Processor Service Routes
    # =============================================================================

    # Chat endpoints (including WebSocket) — needs longer timeout
    location ~ ^/api/v1/chat {
        proxy_pass http://processor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # A2A Protocol endpoints
    location ~ ^/api/v1/a2a {
        proxy_pass http://processor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Agent-specific integration endpoints
    location ~ ^/api/v1/agents/[^/]+/integrations {
        proxy_pass http://processor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # OAuth callback endpoints (universal — works for all integrations)
    location ~ ^/api/v1/integrations/[^/]+/callback {
        proxy_pass http://processor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Other Processor endpoints (sessions, tools, clients)
    location ~ ^/api/v1/(sessions|tools|clients) {
        proxy_pass http://processor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =============================================================================
    # Webhook Routes → CRM Service
    # =============================================================================
    location ~ ^/(api/)?(rails/)?webhooks {
        proxy_pass http://crm_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 10M;
    }

    # =============================================================================
    # ActionCable WebSocket (/cable)
    # =============================================================================
    location /cable {
        proxy_pass http://crm_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # =============================================================================
    # Health Check
    # =============================================================================
    location ~ ^/(health|ready|healthz|readyz)$ {
        proxy_pass http://processor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # =============================================================================
    # CRM Service Routes (default — all other /api/v1/* paths)
    # =============================================================================
    location ~ ^/api/v1/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With, account-id, api_access_token' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass http://crm_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass_header 'Access-Control-Allow-Origin';
        proxy_pass_header 'Access-Control-Allow-Methods';
        proxy_pass_header 'Access-Control-Allow-Headers';
        proxy_pass_header 'Access-Control-Allow-Credentials';
    }

    # =============================================================================
    # Catch-all → CRM Service
    # =============================================================================
    location / {
        proxy_pass http://crm_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header account-id $http_account_id;
        proxy_set_header api_access_token $http_api_access_token;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
